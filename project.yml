name: SunsdrMobile
options:
  bundleIdPrefix: com.hamradio
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    INFOPLIST_FILE: Resources/Info.plist
    DEVELOPMENT_TEAM: "VQ89MM7935"

schemes:
  SunsdrMobile:
    build:
      targets:
        SunsdrMobile: all
    run:
      config: Debug
    test:
      config: Debug

targets:
  SunsdrMobile:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hamradio.sunsdrmobile
        INFOPLIST_FILE: Resources/Info.plist
        SUPPORTED_PLATFORMS: iphoneos
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: "VQ89MM7935"
        CODE_SIGN_STYLE: Automatic
